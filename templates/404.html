{% load static %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 - Page Not Found</title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              rel="stylesheet" />
        <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
              rel="stylesheet" />
        <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        background: linear-gradient(
          135deg,
          rgba(15, 23, 42, 0.95),
          rgba(30, 41, 59, 0.95)
        ),
        url('{% static "images/cricket.jpg" %}');
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        color: white;
      }

      .error-container {
        width: 100%;
        max-width: 900px;
        padding: 20px;
      }

      .error-card {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 28px;
        padding: 60px 50px;
        text-align: center;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.35);
      }

      .error-code {
        font-size: 140px;
        font-weight: 700;
        line-height: 1;
        color: #ffc107;
        text-shadow: 0 6px 25px rgba(255, 193, 7, 0.35);
      }

      .error-title {
        font-size: 42px;
        font-weight: 600;
        margin-top: 15px;
      }

      .error-description {
        max-width: 650px;
        margin: 20px auto 35px;
        font-size: 18px;
        line-height: 1.8;
        color: rgba(255, 255, 255, 0.85);
      }

      .btn-custom {
        padding: 14px 28px;
        border-radius: 50px;
        font-weight: 500;
        font-size: 16px;
        transition: all 0.3s ease;
      }

      .btn-home {
        background: #ffc107;
        border: none;
        color: #111827;
      }

      .btn-home:hover {
        background: #ffca2c;
        transform: translateY(-2px);
      }

      .btn-blog {
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: white;
        background: rgba(255, 255, 255, 0.08);
      }

      .btn-blog:hover {
        background: rgba(255, 255, 255, 0.16);
        color: white;
        transform: translateY(-2px);
      }

      .floating-circle {
        position: absolute;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.05);
        animation: float 8s infinite ease-in-out;
      }

      .circle-1 {
        width: 220px;
        height: 220px;
        top: -50px;
        left: -70px;
      }

      .circle-2 {
        width: 180px;
        height: 180px;
        bottom: -60px;
        right: -40px;
        animation-delay: 2s;
      }

      .circle-3 {
        width: 120px;
        height: 120px;
        top: 15%;
        right: 8%;
        animation-delay: 4s;
      }

      @keyframes float {
        0% {
          transform: translateY(0px);
        }

        50% {
          transform: translateY(-20px);
        }

        100% {
          transform: translateY(0px);
        }
      }

      @media (max-width: 768px) {
        .error-card {
          padding: 40px 25px;
        }

        .error-code {
          font-size: 90px;
        }

        .error-title {
          font-size: 30px;
        }

        .error-description {
          font-size: 16px;
        }

        .button-group {
          display: flex;
          flex-direction: column;
          gap: 15px;
        }
      }
        </style>
    </head>
    <body>
        <div class="floating-circle circle-1"></div>
        <div class="floating-circle circle-2"></div>
        <div class="floating-circle circle-3"></div>
        <div class="error-container">
            <div class="error-card">
                <h1 class="error-code">404</h1>
                <h2 class="error-title">Oops! Page Not Found</h2>
                <p class="error-description">
                    The page you are trying to access may have been removed, renamed,
                    or is temporarily unavailable. Explore the latest stories, blogs,
                    and articles from our platform instead.
                </p>
                <div class="button-group d-flex justify-content-center gap-3 flex-wrap">
                    <a href="/" class="btn btn-custom btn-home">⬅ Back To Home</a>
                    <a href="/blogs/" class="btn btn-custom btn-blog">📚 Explore Blogs</a>
                </div>
            </div>
        </div>
    </body>
</html>
